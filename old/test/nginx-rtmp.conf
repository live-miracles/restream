worker_processes auto;
rtmp_auto_push on;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
        }
    }
}

http {
    server {
        listen 80;

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        location /hls-upload/ {
            client_max_body_size 64m;

            if ($request_method !~ ^(PUT|DELETE)$) {
                add_header Allow "PUT, DELETE" always;
                return 405;
            }

            return 204;
        }

        location / {
            return 200 'nginx-rtmp is running';
            add_header Content-Type text/plain;
        }
    }
}