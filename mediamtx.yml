# Restream — minimal MediaMTX configuration
#
# Ingestion:  RTMP  rtmp://<host>:1935/<streamPath>
#             RTSP  rtsp://<host>:8554/<streamPath>
#             SRT   srt://<host>:10080?streamid=publish:<streamPath>
#
# Viewing:    RTSP    rtsp://localhost:8554/<streamPath>  (localhost only)
#
# Internal:   API     http://localhost:9997  (used by restream backend)

# ── Ingest protocols ────────────────────────────────────────────────────────
rtmp: yes          # port 1935
rtsp: yes          # port 8554
srt: yes
srtAddress: :10080
# Global SRT latency for latency testing; applies to receiver and peer latency.
srtLatency: 120ms

# ── Browser playback ────────────────────────────────────────────────────────
hls: yes           # HTTP HLS on port 8888
# Keep HLS local-only by default; app-level /preview/hls proxy serves browser playback.
hlsAddress: 127.0.0.1:8888
webrtc: no

# Keep HLS muxers on-demand to reduce steady CPU/RAM use when many inputs are idle.
# Tradeoff: first preview request may take longer while MediaMTX starts a fresh HLS muxer.
hlsAlwaysRemux: no
hlsVariant: lowLatency

# ── Backend API ─────────────────────────────────────────────────────────────
api: yes
# Bind the control API to localhost so it remains available to the local
# restream backend without being exposed on external interfaces by default.
apiAddress: 127.0.0.1:9997   # used by restream for /v3/paths and /v3/*conns

# ── Observability ───────────────────────────────────────────────────────────
# Prometheus-compatible metrics for MediaMTX. Keep this local-only and let
# Prometheus scrape it from the same host or a trusted host-network container.
metrics: yes
metricsAddress: 127.0.0.1:9998

# ── Access control ──────────────────────────────────────────────────────────
# Delegate publish/read/playback decisions to the local Restream auth endpoint.
# The endpoint validates live/<streamKey> publishes and temporarily bans IPs that
# repeatedly try unknown stream keys.
authMethod: http
authHTTPAddress: http://127.0.0.1:3030/internal/mediamtx/auth
authHTTPExclude:
    - action: api
    - action: metrics
    - action: pprof

# API/metrics/pprof stay on internal auth so localhost tooling can keep using
# the MediaMTX control plane even while publish/read/playback auth is delegated.
authInternalUsers:
    # 1. Localhost: Allowed to read, publish, and access internal control endpoints
    - user: any
      pass:
      ips: ['127.0.0.1', '::1']
      permissions:
          - action: publish
          - action: read
          - action: playback
          - action: api
          - action: metrics
          - action: pprof

    # 2. Outsiders (Any IP): Allowed ONLY to publish
    - user: any
      pass:
      ips: []
      permissions:
          - action: publish

# ── Paths ───────────────────────────────────────────────────────────────────
# Restream reads these fixed paths through the MediaMTX control API.
# Restream exposes the final path segment as the stream key. The display name
# is the part before the first underscore.
#
# Important: Change the secret keys before deploying the production version.
paths:
#    live/key01_6c71124cde80358ca7c13081: {}
#    live/key02_fff2adcf55a26d31ae93464b: {}
#    live/key03_c8087d1adb6b3bdf8e806d8f: {}
#    live/key04_4a1fe99ef35b0d0768076be7: {}

    live/key01_6c71124cde80358ca7c13081:
        runOnReady: >
            ffmpeg
            -hide_banner -loglevel info -nostdin
            -i "srt://127.0.0.1:10080?streamid=read:live/key01_6c71124cde80358ca7c13081"
            -map 0:v:0 -map 0:a:0 -c copy -f mpegts
            "srt://127.0.0.1:10080?streamid=publish:live/key02_fff2adcf55a26d31ae93464b"
            -map 0:v:0 -map 0:a:1 -c copy -f mpegts
            "srt://127.0.0.1:10080?streamid=publish:live/key03_c8087d1adb6b3bdf8e806d8f"
            -map 0:v:0 -map 0:a:2 -c copy -f mpegts
            "srt://127.0.0.1:10080?streamid=publish:live/key04_4a1fe99ef35b0d0768076be7"
        runOnReadyRestart: yes

    live/key02_fff2adcf55a26d31ae93464b: {}
    live/key03_c8087d1adb6b3bdf8e806d8f: {}
    live/key04_4a1fe99ef35b0d0768076be7: {}


