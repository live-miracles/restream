name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run format:check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run test:normalization

  build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci && npm run ts-build && npm run css && npm run vendor-hls
      - run: go build ./...

  integration:
    name: Integration test (2x3)
    runs-on: ubuntu-latest
    needs: [unit, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -q ffmpeg

      - name: Cache MediaMTX binary
        id: cache-mediamtx
        uses: actions/cache@v4
        with:
          path: bin/mediamtx
          key: mediamtx-1.17.1-${{ runner.arch }}

      - name: Download MediaMTX
        if: steps.cache-mediamtx.outputs.cache-hit != 'true'
        run: |
          MEDIAMTX_VERSION="1.17.1"
          case "$(uname -m)" in
            x86_64)  ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *) echo "Unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          FILE="mediamtx_v${MEDIAMTX_VERSION}_linux_${ARCH}.tar.gz"
          URL="https://github.com/bluenviron/mediamtx/releases/download/v${MEDIAMTX_VERSION}/${FILE}"
          mkdir -p bin/mediamtx
          curl -fsSL "$URL" | tar -xz -C bin/mediamtx

      - name: Ensure MediaMTX is executable
        run: chmod +x bin/mediamtx/mediamtx

      - name: Build frontend assets
        run: npm ci && npm run ts-build && npm run css && npm run vendor-hls

      - name: Build Go binary (embeds frontend assets)
        run: go build -o dist/restream ./cmd/server

      - name: Start MediaMTX
        run: bin/mediamtx/mediamtx &

      - name: Start app
        run: ./dist/restream &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3030/healthz; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready after 60s" >&2
          exit 1

      - name: Run 2x3 integration test
        run: npm run test:integration

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: test/artifacts/logs/
          if-no-files-found: ignore
