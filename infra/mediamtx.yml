# Restream — minimal MediaMTX configuration
#
# Ingestion:  RTMP  rtmp://<host>:1935/<streamKey>
#             RTSP  rtsp://<host>:8554/<streamKey>
#             SRT   srt://<host>:8890?streamid=publish:<streamKey>
#
# Viewing:    RTSP    rtsp://<host>:8554/<streamKey>
#
# Internal:   API     http://localhost:9997  (used by restream backend)

# ── Ingest protocols ────────────────────────────────────────────────────────
rtmp: yes          # port 1935
rtsp: yes          # port 8554
srt: yes           # port 8890

# ── Browser playback ────────────────────────────────────────────────────────
hls: yes           # HTTP HLS on port 8888
# Keep HLS local-only by default; app-level /preview/hls proxy serves browser playback.
hlsAddress: 127.0.0.1:8888
webrtc: no

# Keep HLS muxers warm and use compatibility-oriented MPEG-TS packaging so first preview loads
# do not block on on-demand muxer startup.
# Tradeoff: lower cold-start latency and broader browser compatibility, but higher steady CPU/RAM
# use because muxers stay active for ready paths even before a viewer asks for preview.
hlsAlwaysRemux: yes
hlsVariant: mpegts

# ── Backend API ─────────────────────────────────────────────────────────────
api: yes
# Bind the control API to localhost so it remains available to the local
# restream backend without being exposed on external interfaces by default.
apiAddress: 127.0.0.1:9997   # used by restream for /v3/paths and /v3/*conns

# ── Access control ──────────────────────────────────────────────────────────
# Allow any client to publish, read, and use the API without authentication.
# Restrict this in production by replacing 'any' with named users.
authInternalUsers:
    - user: any
      pass:
      ips: []
      permissions:
          - action: publish
          - action: read
          - action: playback
          - action: api

# ── Paths ───────────────────────────────────────────────────────────────────
# No explicit paths needed — MediaMTX accepts any path on demand.
# Add per-path overrides here only if custom behaviour is required.
paths: {}
