<svg viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12">
  <title>Unit-test line coverage by module (June 27, 2026)</title>
  <desc>Horizontal bar chart showing line coverage percentage for 27 source modules, ranging from 0% (db, main, h264_transcoder) to 100% (pipe_metrics). Overall coverage is 55.4%.</desc>

  <style>
    rect.bar-high   { fill: #1baf7a; }
    rect.bar-mid    { fill: #eda100; }
    rect.bar-low    { fill: #e34948; }
    text.label      { fill: #52514e; font-size: 11px; }
    text.pct        { fill: #0b0b0b; font-size: 11px; font-weight: 500; }
    text.pct-zero   { fill: #e34948; font-size: 11px; font-weight: 500; }
    text.title      { fill: #0b0b0b; font-size: 14px; font-weight: 500; }
    text.subtitle   { fill: #52514e; font-size: 12px; }
    line.grid       { stroke: #e1e0d9; stroke-width: 0.5; }
    text.axis       { fill: #898781; font-size: 10px; }
    text.legend     { fill: #52514e; font-size: 11px; }
    rect.legend-box { rx: 2; ry: 2; }
  </style>

  <!-- title -->
  <text x="160" y="22" class="title">Unit-test line coverage by module</text>
  <text x="160" y="40" class="subtitle">cargo llvm-cov — lib tests only — June 27, 2026 — overall 55.4%</text>

  <!-- grid lines at 0%, 25%, 50%, 75%, 100% -->
  <!-- chart area: x=160 to x=630, y=55 to y=715, bar step=24px -->
  <line x1="160" y1="55" x2="160" y2="720" class="grid" stroke="#c3c2b7" stroke-width="0.8"/>
  <line x1="277.5" y1="55" x2="277.5" y2="720" class="grid"/>
  <line x1="395" y1="55" x2="395" y2="720" class="grid"/>
  <line x1="512.5" y1="55" x2="512.5" y2="720" class="grid"/>
  <line x1="630" y1="55" x2="630" y2="720" class="grid" stroke="#c3c2b7" stroke-width="0.8"/>

  <!-- axis labels -->
  <text x="160" y="732" class="axis" text-anchor="middle">0%</text>
  <text x="277.5" y="732" class="axis" text-anchor="middle">25%</text>
  <text x="395" y="732" class="axis" text-anchor="middle">50%</text>
  <text x="512.5" y="732" class="axis" text-anchor="middle">75%</text>
