# Cap parallel rustc jobs so concurrent builds don't OOM.
# Override with: CARGO_BUILD_JOBS=N cargo build
[build]
jobs = 8

# mold is ~10× faster than ld for linking. All profiles benefit.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Point ffmpeg-sys-next's build.rs at the repo-managed static prefix so it
# detects the correct FFmpeg version (≥ 8.0) and emits the right cfg flags.
# Our build.rs handles actual linking; the sys crate's duplicate link
# directives are harmless.
[env]
FFMPEG_DIR = { value = ".build/static/prefix", relative = true, force = false }
