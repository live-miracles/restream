services:
    # Host profile: run MediaMTX with app on host machine.
    mediamtx:
        profiles: ['host']
        image: bluenviron/mediamtx:1
        container_name: mediamtx
        network_mode: host
        # In case you cannot use host networking, you can uncomment the below
        # environment:
        #     # Override mediamtx.yml setting for app to reach MTX
        #     MTX_APIADDRESS: "0.0.0.0:9997"
        #     # Host profile needs externally bound HLS while base config stays localhost-only.
        #     MTX_HLSADDRESS: "0.0.0.0:8888"
        # ports:
        #     - '1935:1935' # RTMP ingest (mediamtx)
        #     - '8554:8554' # RTSP ingest and read (mediamtx)
        #     - '8890:8890/udp' # SRT ingest (mediamtx)
        #     - '127.0.0.1:8888:8888' # HTTP interface / HLS (host-local only)
        #     - '127.0.0.1:9997:9997' # MediaMTX API (host-local only)
        volumes:
            - ./infra/mediamtx.yml:/mediamtx.yml

    # Container profile: shared network namespace for app + MediaMTX.
    pause:
        profiles: ['container']
        image: gcr.io/google_containers/pause:latest
        container_name: pause
        ports:
            - '3030:3030' # app
            - '1935:1935' # RTMP ingest (mediamtx)
            - '8554:8554' # RTSP ingest and read (mediamtx)
            - '8890:8890/udp' # SRT ingest (mediamtx)

    # App uses pause network namespace so MediaMTX is reachable on localhost.
    app:
        profiles: ['container']
        build:
            context: .
            dockerfile: Dockerfile
        container_name: app
        network_mode: service:pause
        environment:
            NODE_ENV: production
            PORT: 3030
        volumes:
            - ./src/config/restream.json:/app/src/config/restream.json:ro
            - ./data:/app/data
        depends_on:
            pause:
                condition: service_started
            mediamtx-pod:
                condition: service_started

    # MediaMTX instance for container profile (joined to pause namespace).
    mediamtx-pod:
        profiles: ['container']
        image: bluenviron/mediamtx:1
        container_name: mediamtx
        network_mode: service:pause
        volumes:
            - ./infra/mediamtx.yml:/mediamtx.yml
        depends_on:
            pause:
                condition: service_started

    # Available in both profiles as an external RTMP test sink.
    nginx-rtmp:
        image: jasonrivers/nginx-rtmp
        container_name: nginx-rtmp
        ports:
            - '1936:1935'
            - '8081:80'
        volumes:
            - ./infra/nginx-rtmp.conf:/opt/nginx/conf/nginx.conf:ro
