<!doctype html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="UTF-8" />
    <title data-name="Settings">Settings</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" type="text/css" href="output.css" />
    <script type="module" src="js/features/settings-entry.js"></script>
  </head>
  <body class="bg-base-100 text-base-content flex h-screen flex-col">
    <div class="navbar bg-base-100 shrink-0">
      <div class="flex flex-1 items-center gap-3">
        <button class="btn btn-ghost text-xl" id="server-name" onclick="location.href = '/'">Restream</button>
      </div>
      <div class="flex flex-1 justify-end">
        <ul class="menu menu-horizontal px-1">
          <li><a href="/">Dashboard</a></li>
          <li><a href="/settings.html">Settings</a></li>
          <li><a href="https://github.com/live-miracles/restream">GitHub</a></li>
        </ul>
      </div>
    </div>

    <div
      id="top-banner-stack"
      class="fixed left-1/2 z-999 flex -translate-x-1/2 transform flex-col items-center gap-2"
      style="top: 0.5rem; pointer-events: none">
      <div role="alert" id="error-alert" class="alert alert-error hidden max-w-175 opacity-90" style="pointer-events: auto">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="error-msg"></span>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-6">
      <div class="mx-auto max-w-3xl space-y-8">
        <h1 class="text-2xl font-bold">Settings</h1>

        <!-- Server Name -->
        <section class="bg-base-200 rounded-xl p-5 shadow">
          <h2 class="mb-4 text-lg font-semibold">Server Name</h2>
          <div class="flex items-center gap-3">
            <input type="text" id="settings-server-name" class="input w-64" placeholder="Name" />
            <button class="btn btn-accent btn-sm" onclick="saveServerName()">Save</button>
            <span id="server-name-saved" class="text-success hidden text-sm">Saved</span>
          </div>
        </section>

        <!-- Videos -->
        <section class="bg-base-200 rounded-xl p-5 shadow">
          <h2 class="mb-4 text-lg font-semibold">Videos</h2>
          <div id="media-list" class="space-y-0">
            <p class="text-sm opacity-70">Loading...</p>
          </div>
        </section>

        <!-- Video Ingest -->
        <section class="bg-base-200 rounded-xl p-5 shadow">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Video Ingest</h2>
            <button class="btn btn-accent btn-sm" onclick="openAddIngestForm()">Add</button>
          </div>

          <!-- Add form -->
          <div id="ingest-add-form" class="bg-base-300 mb-4 hidden space-y-3 rounded-lg p-4">
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
              <fieldset class="fieldset">
                <legend class="fieldset-legend">Video File</legend>
                <select id="ingest-file" class="select w-full">
                  <option value="">Loading...</option>
                </select>
              </fieldset>
              <fieldset class="fieldset">
                <legend class="fieldset-legend">Stream Key</legend>
                <select id="ingest-stream-key" class="select w-full">
                  <option value="">Loading...</option>
                </select>
              </fieldset>
              <fieldset class="fieldset">
                <legend class="fieldset-legend">Start Time</legend>
                <input type="text" id="ingest-start-time" class="input w-full" placeholder="e.g. 00:01:30" />
              </fieldset>
              <fieldset class="fieldset flex flex-col justify-end pb-2">
                <label class="label cursor-pointer gap-2">
                  <input type="checkbox" id="ingest-loop" class="checkbox checkbox-sm" />
                  <span class="label-text">Loop</span>
                </label>
              </fieldset>
            </div>
            <div class="flex gap-2">
              <button id="ingest-save-btn" class="btn btn-accent btn-sm" onclick="saveIngest()">Save</button>
              <button class="btn btn-ghost btn-sm" onclick="closeAddIngestForm()">Cancel</button>
            </div>
          </div>

          <!-- Ingest list -->
          <div id="ingest-list">
            <p class="text-sm opacity-70">Loading...</p>
          </div>
        </section>

        <!-- Custom Encoding -->
        <section class="bg-base-200 rounded-xl p-5 shadow">
          <h2 class="mb-4 text-lg font-semibold">Custom Encoding</h2>
          <p class="mb-3 text-sm opacity-70">FFmpeg args used when an output's encoding is set to <span class="font-mono">custom</span>.</p>
          <fieldset class="fieldset">
            <legend class="fieldset-legend">FFmpeg Args</legend>
            <textarea
              id="custom-enc-args"
              class="textarea w-full font-mono text-sm"
              rows="4"
              placeholder="-vf scale=-2:720 -c:v libx264 -preset veryfast -b:v 3000k -c:a aac -b:a 128k"></textarea>
          </fieldset>
          <div class="mt-3 flex items-center gap-3">
            <button class="btn btn-accent btn-sm" onclick="saveCustomEncoding()">Save</button>
            <span id="custom-enc-saved" class="text-success hidden text-sm">Saved</span>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
