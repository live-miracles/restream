<!doctype html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="UTF-8" />
    <title data-name="Keys">Keys</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" type="text/css" href="output.css" />
    <script type="module" src="js/features/stream-keys-page.js"></script>
  </head>
  <body class="bg-base-100 text-base-content flex h-screen flex-col">
    <div class="navbar bg-base-100 shrink-0">
      <!-- LEFT -->
      <div class="flex-1">
        <li><a href="/" id="server-name" class="btn btn-ghost text-xl">Restream</a></li>
      </div>

      <!-- CENTER -->
      <div class="flex-none">
        <label class="swap">
          <input id="saving-badge" type="checkbox" disabled />
          <div class="swap-off"></div>
          <div class="swap-on flex items-center gap-2">
            <span class="loading loading-infinity loading-xs"></span>
            Saving
          </div>
        </label>
      </div>

      <!-- RIGHT -->
      <div class="flex flex-1 justify-end">
        <ul class="menu menu-horizontal px-1">
          <li><a href="/stream-keys.html" class="dynamic-params">Keys</a></li>
          <li><a href="https://github.com/live-miracles/restream" target="_blank">GitHub</a></li>
        </ul>
      </div>
    </div>

    <div id="copied-notification" role="alert" class="alert alert-success fixed bottom-3 left-1/2 z-60 hidden w-fit -translate-x-1/2 transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span>Copied</span>
    </div>

    <div role="alert" id="error-alert" class="alert alert-error fixed top-3 left-1/2 z-999 hidden max-w-175 -translate-x-1/2 transform opacity-90">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span id="error-msg"></span>
    </div>

    <div class="rounded-box border-base-content/5 bg-base-100 mx-auto w-fit overflow-x-auto border">
      <table class="table">
        <!-- head -->
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Value</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="stream-keys"></tbody>
      </table>
    </div>

    <button class="btn btn-accent mx-auto my-10 w-fit" onclick="openAddKeyModal()">Add Key</button>

    <dialog id="key-modal" class="modal">
      <div class="modal-box max-w-md">
        <h2 class="mb-4 text-xl font-bold" id="key-modal-title">Add Stream Key</h2>

        <div class="space-y-4">
          <fieldset class="fieldset">
            <legend class="fieldset-legend">Label</legend>
            <input type="text" id="key-label-input" class="input w-full" placeholder="e.g., Event 2026 - Team A" required />
          </fieldset>

          <div class="text-base-content/60 text-xs">Give a descriptive name for easy identification.</div>
        </div>

        <div class="modal-action mt-6">
          <form method="dialog">
            <button class="btn">Cancel</button>
            <button type="button" class="btn btn-accent" id="key-submit-btn">Create Key</button>
          </form>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button></button></form>
    </dialog>

    <dialog id="delete-key-modal" class="modal">
      <div class="modal-box max-w-md">
        <h2 class="mb-4 text-xl font-bold">Delete Stream Key?</h2>

        <div class="space-y-4">
          <p class="text-base-content/80">Are you sure you want to delete <span id="delete-key-label" class="font-semibold"></span>?</p>
          <p class="text-base-content/60 text-sm">This action cannot be undone. Any pipelines using this key will be orphaned.</p>
        </div>

        <div class="modal-action mt-6">
          <form method="dialog">
            <button class="btn">Cancel</button>
            <button type="button" class="btn btn-error" id="delete-confirm-btn">Delete Key</button>
          </form>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button></button></form>
    </dialog>
  </body>
</html>
